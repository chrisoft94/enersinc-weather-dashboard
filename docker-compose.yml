version: '3.8'

services:
  db:
    image: postgres:15
    container_name: enersinc_db
    environment:
      POSTGRES_DB: enersinc_weather
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: enersinc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enersinc_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DB_NAME=enersinc_weather
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - OPENWEATHER_API_KEY=your_api_key_here # Reemplazar con tu propia API Key
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: enersinc_frontend
    ports:
      - "3000:3000" # Exposes standard React/Next.js/Vite port
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # CONFIGURACIÓN DE RED (Cambiar 'localhost' por la IP Pública de Oracle al desplegar)
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/ws/weather/
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
